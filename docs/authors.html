<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Author Guide — DA Training for Bimota</title>
<meta name="description" content="Full author manual for building Bimota pages with da.live.">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
<link rel="stylesheet" href="../assets/css/custom.css">
<style>
  #doc-content table { width: 100%; }
  #doc-content h2 { margin-top: 2.5rem; padding-top: 1rem; border-top: 1px solid #dee2e6; }
  #doc-content pre { background:#1e1e1e; color:#f2f2f2; padding: .9rem 1rem; border-radius:.5rem; overflow-x:auto; }
  #doc-content code { background:#f5f5f5; padding: .1rem .35rem; border-radius:.25rem; }
  #doc-content pre code { background: none; padding: 0; color: inherit; }
  #doc-content blockquote { border-left: 4px solid var(--bimota-red); background:#fdecee; padding:.6rem 1.1rem; border-radius: 0 .5rem .5rem 0; }
</style>
</head>
<body>
<div id="site-nav" data-root=".."></div>

<header class="page-hero">
  <div class="container">
    <span class="eyebrow d-block mb-2">docs/authors.md</span>
    <h1 class="display-6 fw-bold">Author Guide</h1>
    <p class="lead">The complete manual for content authors building Bimota pages in da.live.</p>
    <a class="btn btn-outline-light" href="authors.md" target="_blank" rel="noopener">View raw Markdown ↗</a>
  </div>
</header>

<main class="py-5">
  <div class="container">
    <div class="row">
      <aside class="col-lg-3 d-none d-lg-block">
        <nav class="toc-sidebar" aria-label="Table of contents">
          <div class="fw-bold mb-2 text-uppercase small text-secondary">On this page</div>
          <ul class="nav flex-column" id="toc-list"></ul>
        </nav>
      </aside>
      <div class="col-lg-9">
        <div id="doc-content">Loading guide…</div>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer" id="site-footer"></footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="../assets/js/app.js" defer></script>
<script>
  fetch('authors.md', { cache: 'no-store' })
    .then((r) => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.text();
    })
    .then((md) => {
      const contentEl = document.getElementById('doc-content');
      contentEl.innerHTML = marked.parse(md);
      contentEl.querySelectorAll('table').forEach((t) => t.classList.add('table', 'table-bordered', 'align-middle', 'my-3'));

      // Build the sticky TOC from the rendered h2 headings.
      const tocList = document.getElementById('toc-list');
      contentEl.querySelectorAll('h2[id]').forEach((h2) => {
        const li = document.createElement('li');
        li.className = 'nav-item';
        li.innerHTML = `<a class="nav-link p-0 py-1" href="#${h2.id}">${h2.textContent}</a>`;
        tocList.appendChild(li);
      });
    })
    .catch((err) => {
      document.getElementById('doc-content').innerHTML =
        `<div class="alert alert-warning"><strong>Couldn't load authors.md automatically</strong> (${err.message}). ` +
        `Open <a href="authors.md">authors.md</a> directly, or check that this page is served over http(s) rather than opened as a local file:// path.</div>`;
    });
</script>
</body>
</html>
