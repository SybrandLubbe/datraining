<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>README — DA Training for Bimota</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
<link rel="stylesheet" href="assets/css/custom.css">
<style>
  #doc-content pre { background:#1e1e1e; color:#f2f2f2; padding: .9rem 1rem; border-radius:.5rem; overflow-x:auto; }
  #doc-content code { background:#f5f5f5; padding: .1rem .35rem; border-radius:.25rem; }
  #doc-content pre code { background: none; padding: 0; color: inherit; }
  #doc-content table { width:100%; }
</style>
</head>
<body>
<div id="site-nav" data-root="."></div>

<header class="page-hero">
  <div class="container">
    <span class="eyebrow d-block mb-2">README.md</span>
    <h1 class="display-6 fw-bold">Project README</h1>
    <p class="lead">Overview, download, and deploy instructions for this training site.</p>
    <a class="btn btn-outline-light" href="README.md" target="_blank" rel="noopener">View raw Markdown ↗</a>
  </div>
</header>

<main class="py-5">
  <div class="container" style="max-width:840px;">
    <div id="doc-content">Loading…</div>
  </div>
</main>

<footer class="site-footer" id="site-footer"></footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="assets/js/app.js" defer></script>
<script>
  fetch('README.md', { cache: 'no-store' })
    .then((r) => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); })
    .then((md) => {
      const el = document.getElementById('doc-content');
      el.innerHTML = marked.parse(md);
      el.querySelectorAll('table').forEach((t) => t.classList.add('table', 'table-bordered', 'my-3'));
    })
    .catch((err) => {
      document.getElementById('doc-content').innerHTML =
        `<div class="alert alert-warning">Couldn't load README.md automatically (${err.message}). Open <a href="README.md">README.md</a> directly.</div>`;
    });
</script>
</body>
</html>
