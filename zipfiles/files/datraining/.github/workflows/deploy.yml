# Deploys this static training site to GitHub Pages whenever main is updated.
# No build step is required (plain HTML/CSS/JS), so this simply uploads the
# repository contents as the Pages artifact.
#
# One-time setup: in the repo's Settings → Pages, set "Source" to
# "GitHub Actions" so this workflow is the one serving the site.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the whole repo root — this is a static, buildless site.
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
